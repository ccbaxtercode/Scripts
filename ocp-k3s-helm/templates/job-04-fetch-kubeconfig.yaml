# ============================================================================
# Job 4: Fetch Kubeconfig
# Final step in sequential K3s cluster deployment
# 
# Dependencies:
#   - All previous jobs must complete
#   - At least Master-0 must be running with K3s
# 
# Responsibilities:
#   1. Wait for all previous jobs to complete
#   2. Connect to Master-0 VM
#   3. Retrieve /etc/rancher/k3s/k3s.yaml
#   4. Update server URL to use Route hostname
#   5. Save kubeconfig to Secret for user download
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-04-fetch-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
    app.kubernetes.io/component: deployment
    deployment-step: "04"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "k3s.labels" . | nindent 8 }}
        app.kubernetes.io/component: deployment
        deployment-step: "04"
    spec:
      serviceAccountName: {{ .Release.Name }}-k3s-deployer
      restartPolicy: OnFailure
      
      # ========================================================================
      # Init Container: Wait for cluster to be fully deployed
      # ========================================================================
      initContainers:
        - name: wait-for-cluster
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Waiting for K3s cluster to be fully deployed..."
              
              # Wait for Job-1 (Master-0)
              echo "Checking Job-1 (Master-0)..."
              while true; do
                JOB_STATUS=$(oc get job {{ .Release.Name }}-01-create-master0 -n {{ .Release.Namespace }} -o jsonpath='{.status.succeeded}')
                if [ "$JOB_STATUS" = "1" ]; then
                  echo "✓ Job-1 completed"
                  break
                fi
                sleep 5
              done
              
              {{- if gt (int .Values.masterCount) 1 }}
              # Wait for Job-2 (Additional masters)
              echo "Checking Job-2 (Additional masters)..."
              while true; do
                JOB_STATUS=$(oc get job {{ .Release.Name }}-02-create-masters -n {{ .Release.Namespace }} -o jsonpath='{.status.succeeded}')
                if [ "$JOB_STATUS" = "1" ]; then
                  echo "✓ Job-2 completed"
                  break
                fi
                sleep 5
              done
              {{- end }}
              
              {{- if gt (int .Values.workerCount) 0 }}
              # Wait for Job-3 (Workers)
              echo "Checking Job-3 (Workers)..."
              while true; do
                JOB_STATUS=$(oc get job {{ .Release.Name }}-03-create-workers -n {{ .Release.Namespace }} -o jsonpath='{.status.succeeded}')
                if [ "$JOB_STATUS" = "1" ]; then
                  echo "✓ Job-3 completed"
                  break
                fi
                sleep 5
              done
              {{- end }}
              
              echo "All deployment jobs completed. Proceeding to fetch kubeconfig..."
          env:
            - name: HOME
              value: /tmp
      
      # ========================================================================
      # Main Container: Fetch kubeconfig from Master-0
      # ========================================================================
      containers:
        - name: fetch-kubeconfig
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "============================================"
              echo "Job 4: Fetching Kubeconfig from Master-0"
              echo "============================================"
              
              # Wait a bit more to ensure K3s is fully ready
              echo "Waiting for K3s to stabilize..."
              sleep 30
              
              # Get the VMI pod name for Master-0
              echo "Finding Master-0 VMI pod..."
              VMI_POD=$(oc get pod -n {{ .Release.Namespace }} \
                -l kubevirt.io/domain={{ .Release.Name }}-master-0 \
                -o jsonpath='{.items[0].metadata.name}')
              
              if [ -z "$VMI_POD" ]; then
                echo "ERROR: Could not find Master-0 VMI pod"
                exit 1
              fi
              
              echo "Master-0 VMI pod: $VMI_POD"
              
              # Attempt to fetch kubeconfig
              MAX_RETRIES=20
              RETRY=0
              KUBECONFIG_CONTENT=""
              
              while [ $RETRY -lt $MAX_RETRIES ]; do
                echo "Attempt $((RETRY + 1))/$MAX_RETRIES to fetch kubeconfig..."
                
                # Try to read kubeconfig file from VM
                # Note: This uses virtctl-like access through the virt-launcher pod
                if KUBECONFIG_RAW=$(oc exec -n {{ .Release.Namespace }} $VMI_POD -- \
                  bash -c "test -f /etc/rancher/k3s/k3s.yaml && cat /etc/rancher/k3s/k3s.yaml" 2>/dev/null); then
                  
                  if [ -n "$KUBECONFIG_RAW" ]; then
                    KUBECONFIG_CONTENT="$KUBECONFIG_RAW"
                    echo "✓ Kubeconfig fetched successfully!"
                    break
                  fi
                fi
                
                echo "Kubeconfig not ready yet, waiting..."
                sleep 10
                RETRY=$((RETRY + 1))
              done
              
              if [ -z "$KUBECONFIG_CONTENT" ]; then
                echo "ERROR: Failed to fetch kubeconfig after $MAX_RETRIES attempts"
                echo "Trying alternative method via exec into VM..."
                
                # Alternative: Try direct file read if mounted
                KUBECONFIG_CONTENT=$(oc exec -n {{ .Release.Namespace }} $VMI_POD -- \
                  cat /etc/rancher/k3s/k3s.yaml 2>/dev/null || echo "")
                
                if [ -z "$KUBECONFIG_CONTENT" ]; then
                  echo "ERROR: All methods to fetch kubeconfig failed"
                  exit 1
                fi
              fi
              
              # Get Route hostname for external access
              echo "Getting Route hostname..."
              ROUTE_HOST=$(oc get route {{ include "k3s.serviceName" . }} \
                -n {{ .Release.Namespace }} \
                -o jsonpath='{.spec.host}')
              
              if [ -z "$ROUTE_HOST" ]; then
                echo "ERROR: Could not get Route hostname"
                exit 1
              fi
              
              echo "Route hostname: $ROUTE_HOST"
              
              # Update server URL in kubeconfig
              # Replace 127.0.0.1:6443 with route hostname:443
              echo "Updating kubeconfig server URL..."
              UPDATED_KUBECONFIG=$(echo "$KUBECONFIG_CONTENT" | \
                sed "s|server: https://127.0.0.1:6443|server: https://${ROUTE_HOST}:443|g")
              
              # Also update any localhost references
              UPDATED_KUBECONFIG=$(echo "$UPDATED_KUBECONFIG" | \
                sed "s|server: https://localhost:6443|server: https://${ROUTE_HOST}:443|g")
              
              # Create or update kubeconfig secret
              echo "Saving kubeconfig to Secret..."
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ .Release.Name }}-kubeconfig
                namespace: {{ .Release.Namespace }}
                labels:
                  {{- include "k3s.labels" . | nindent 18 }}
                  app.kubernetes.io/component: kubeconfig
              type: Opaque
              stringData:
                kubeconfig: |
              $(echo "$UPDATED_KUBECONFIG" | sed 's/^/    /')
              EOF
              
              echo "============================================"
              echo "Job 4 Complete: Kubeconfig saved!"
              echo "Secret name: {{ .Release.Name }}-kubeconfig"
              echo "============================================"
          env:
            - name: HOME
              value: /tmp
