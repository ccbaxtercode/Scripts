# ============================================================================
# Service Account for K3s Deployment Jobs
# Used by all Jobs to:
#   - Create and manage VirtualMachines
#   - Check VM status
#   - Execute commands in VMs
#   - Create secrets (kubeconfig)
#   - Read routes
# ============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Release.Name }}-k3s-deployer
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
