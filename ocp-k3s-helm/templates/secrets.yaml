# ============================================================================
# User Credentials Secret
# Stores the admin username and password for VM access
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Admin username for VM login
  username: {{ .Values.username | quote }}
  # Admin password - required field, will fail if not provided
  password: {{ required "A valid .Values.password is required!" .Values.password | quote }}

---
# ============================================================================
# K3s Cluster Token Secret
# Auto-generated secure token for K3s cluster authentication
# Same token is used across all nodes (master and worker)
# ============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-token
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
type: Opaque
stringData:
  # 64-character random token, auto-generated on first install
  # Reused on helm upgrade to maintain cluster integrity
  token: {{ include "k3s.clusterToken" . | quote }}
