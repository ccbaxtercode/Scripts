# ============================================================================
# User Defined Network (UDN) NetworkAttachmentDefinition
# Secondary network for K3s cluster internal communication
# Uses whereabouts for automatic IP allocation
# ============================================================================
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: {{ .Release.Name }}-udn
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
spec:
  config: |
    {
      "cniVersion": "0.4.0",
      "name": "{{ .Values.udn.name }}",
      "type": "macvlan",
      "master": "{{ .Values.udn.masterInterface }}",
      "mode": "bridge",
      "ipam": {
        "type": "whereabouts",
        "range": "{{ .Values.udn.subnet }}",
        "range_start": "{{ .Values.udn.rangeStart }}",
        "range_end": "{{ .Values.udn.rangeEnd }}",
        "gateway": "{{ .Values.udn.gateway }}"
      }
    }
