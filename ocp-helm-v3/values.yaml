# ============================================================================
# K3s Cluster Configuration
# ============================================================================

# Cluster name - used in VM names and labels
clusterName: k3s-cluster

# Number of master nodes (1, 3, or 5 for HA)
masterCount: 1

# Number of worker nodes
workerCount: 2

# ============================================================================
# VM Admin User Configuration
# ============================================================================

# Local admin username (will have sudo access)
username: k3sadmin

# REQUIRED: Admin user password
# This password will be used to login to VMs
password: ""

# Optional: SSH public key for VM access
sshPublicKey: ""

# ============================================================================
# K3s Version
# ============================================================================

# K3s version to install
# See: https://github.com/k3s-io/k3s/releases
k3sVersion: v1.28.5+k3s1

# ============================================================================
# VM Resources
# ============================================================================

vmResources:
  # CPU cores per VM
  cpu: 2
  
  # Memory per VM (e.g., 2Gi, 4Gi, 8Gi)
  memory: 4Gi
  
  # Disk size per VM (e.g., 20Gi, 50Gi, 100Gi)
  diskSize: 20Gi

# ============================================================================
# Storage Configuration
# ============================================================================

# REQUIRED: StorageClass name for VM persistent disks
# Must be a valid StorageClass in your cluster
storageClassName: ""

# ============================================================================
# VM Image
# ============================================================================

# REQUIRED: Ubuntu 22.04 cloud image URL (HTTP)
# Download from: https://cloud-images.ubuntu.com/releases/22.04/release/
# Example: http://your-server.com/ubuntu-22.04-server-cloudimg-amd64.img
ubuntuImageURL: ""

# ============================================================================
# Network Configuration
# ============================================================================
# VMs will use pod network (masquerade mode)
# Service will get external IP from MetalLB
# No additional configuration needed
