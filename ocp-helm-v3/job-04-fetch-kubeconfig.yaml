# ============================================================================
# Job 4: Fetch Kubeconfig and Create Cluster Info Secret
# 
# Steps:
#   1. Wait for all previous jobs
#   2. SSH to Master-0 and get kubeconfig
#   3. Update server URL with Service External IP
#   4. Save kubeconfig to Secret
#   5. Create cluster-info Secret with all details
# ============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-04-fetch-kubeconfig
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "k3s.labels" . | nindent 4 }}
    component: deployment
    deployment-step: "04"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      labels:
        {{- include "k3s.labels" . | nindent 8 }}
        component: deployment
    spec:
      serviceAccountName: {{ .Release.Name }}-k3s-deployer
      restartPolicy: OnFailure
      
      initContainers:
        - name: wait-for-cluster
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Waiting for cluster deployment..."
              
              # Job 1
              while true; do
                J1=$(oc get job {{ .Release.Name }}-01-create-master0 \
                  -n {{ .Release.Namespace }} \
                  -o jsonpath='{.status.succeeded}' || echo "0")
                [ "$J1" = "1" ] && break
                sleep 5
              done
              
              {{- if gt (int .Values.masterCount) 1 }}
              # Job 2
              while true; do
                J2=$(oc get job {{ .Release.Name }}-02-create-masters \
                  -n {{ .Release.Namespace }} \
                  -o jsonpath='{.status.succeeded}' || echo "0")
                [ "$J2" = "1" ] && break
                sleep 5
              done
              {{- end }}
              
              {{- if gt (int .Values.workerCount) 0 }}
              # Job 3
              while true; do
                J3=$(oc get job {{ .Release.Name }}-03-create-workers \
                  -n {{ .Release.Namespace }} \
                  -o jsonpath='{.status.succeeded}' || echo "0")
                [ "$J3" = "1" ] && break
                sleep 5
              done
              {{- end }}
              
              echo "✓ All jobs complete"
          env:
            - name: HOME
              value: /tmp
      
      containers:
        - name: fetch-kubeconfig
          image: quay.io/openshift/origin-cli:latest
          command:
            - /bin/bash
            - -c
            - |
              set -e
              echo "Job 4: Fetching Kubeconfig"
              
              # Get Service External IP
              SERVICE_IP=$(oc get secret {{ .Release.Name }}-service-ip \
                -n {{ .Release.Namespace }} \
                -o jsonpath='{.data.ip}' | base64 -d)
              
              echo "Service IP: $SERVICE_IP"
              
              # Wait for K3s to stabilize
              sleep 30
              
              # Get VMI pod
              VMI_POD=$(oc get pod -n {{ .Release.Namespace }} \
                -l kubevirt.io/domain={{ .Release.Name }}-master-0 \
                -o jsonpath='{.items[0].metadata.name}')
              
              echo "VMI Pod: $VMI_POD"
              
              # Fetch kubeconfig via SSH (requires sshpass in oc-cli image)
              MAX_RETRIES=20
              RETRY=0
              KUBECONFIG_RAW=""
              
              while [ $RETRY -lt $MAX_RETRIES ]; do
                echo "Attempt $((RETRY+1))/$MAX_RETRIES..."
                
                # Try to get kubeconfig (assumes SSH access)
                KUBECONFIG_RAW=$(oc exec -n {{ .Release.Namespace }} $VMI_POD -- \
                  bash -c "cat /etc/rancher/k3s/k3s.yaml 2>/dev/null" || echo "")
                
                if [ -n "$KUBECONFIG_RAW" ]; then
                  echo "✓ Kubeconfig fetched"
                  break
                fi
                
                sleep 10
                RETRY=$((RETRY+1))
              done
              
              if [ -z "$KUBECONFIG_RAW" ]; then
                echo "ERROR: Failed to fetch kubeconfig"
                exit 1
              fi
              
              # Update server URL with Service External IP
              KUBECONFIG_UPDATED=$(echo "$KUBECONFIG_RAW" | \
                sed "s|server: https://127.0.0.1:6443|server: https://${SERVICE_IP}:6443|g")
              
              # Save kubeconfig to Secret
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ .Release.Name }}-kubeconfig
                namespace: {{ .Release.Namespace }}
                labels:
                  {{- include "k3s.labels" . | nindent 18 }}
                  component: kubeconfig
              type: Opaque
              stringData:
                kubeconfig: |
              $(echo "$KUBECONFIG_UPDATED" | sed 's/^/    /')
              EOF
              
              echo "✓ Kubeconfig saved"
              
              # Create Cluster Info Secret
              cat <<EOF | oc apply -f -
              apiVersion: v1
              kind: Secret
              metadata:
                name: {{ .Release.Name }}-cluster-info
                namespace: {{ .Release.Namespace }}
                labels:
                  {{- include "k3s.labels" . | nindent 18 }}
                  component: cluster-info
              type: Opaque
              stringData:
                username: "{{ .Values.username }}"
                password: "{{ .Values.password }}"
                service-name: "{{ include "k3s.serviceName" . }}"
                service-ip: "$SERVICE_IP"
                service-port: "6443"
                cluster-name: "{{ .Values.clusterName }}"
                k3s-version: "{{ .Values.k3sVersion }}"
                master-count: "{{ .Values.masterCount }}"
                worker-count: "{{ .Values.workerCount }}"
              EOF
              
              echo "✓ Cluster info saved"
              echo ""
              echo "=========================================="
              echo "✓ Deployment Complete!"
              echo "=========================================="
          env:
            - name: HOME
              value: /tmp
