apiVersion: v1
kind: Namespace
metadata:
  name: project-creator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: project-creator-sa
  namespace: project-creator
  annotations:
    serviceaccounts.openshift.io/oauth-redirectreference.primary: '{"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"project-creator"}}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: project-creator-auth-delegator
subjects:
  - kind: ServiceAccount
    name: project-creator-sa
    namespace: project-creator
roleRef:
  kind: ClusterRole
  name: system:auth-delegator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: project-creator-role
  namespace: project-creator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: project-creator-rb
  namespace: project-creator
subjects:
  - kind: ServiceAccount
    name: project-creator-sa
    namespace: project-creator
roleRef:
  kind: Role
  name: project-creator-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-creator
  namespace: project-creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-creator
  template:
    metadata:
      labels:
        app: project-creator
    spec:
      serviceAccountName: project-creator-sa
      containers:
        - name: app
          image: project-creator:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.12
          args:
            - --openshift-service-account=project-creator-sa
            - --upstream=http://localhost:8080
            - --provider=openshift
            - --allowed-groups=project-creators
            - --https-port=8443
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret=$(COOKIE_SECRET)
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          env:
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth-proxy-secrets
                  key: cookie-secret
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/tls/private
      volumes:
        - name: tls-cert
          secret:
            secretName: project-creator-tls
---
apiVersion: v1
kind: Service
metadata:
  name: project-creator
  namespace: project-creator
  annotations:
    service.beta.openshift.io/serving-cert-secret-name: project-creator-tls
spec:
  ports:
    - port: 443
      targetPort: 8443
      name: https
  selector:
    app: project-creator
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: project-creator
  namespace: project-creator
spec:
  to:
    kind: Service
    name: project-creator
  tls:
    termination: reencrypt
  port:
    targetPort: https
---
apiVersion: v1
kind: Secret
metadata:
  name: oauth-proxy-secrets
  namespace: project-creator
type: Opaque
stringData:
  cookie-secret: <generate-with-openssl-rand-base64-32>
