apiVersion: v1
kind: Namespace
metadata:
  name: project-creator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: project-creator-sa
  namespace: project-creator
  annotations:
    # oauth-proxy'nin login sonrası nereye redirect yapacağını belirtir
    serviceaccounts.openshift.io/oauth-redirectreference.primary: >-
      {"kind":"OAuthRedirectReference","apiVersion":"v1","reference":{"kind":"Route","name":"project-creator"}}
---
# Uygulama secrets erişimi için namespace-level Role (değişmedi)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: project-creator-role
  namespace: project-creator
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: project-creator-rb
  namespace: project-creator
subjects:
  - kind: ServiceAccount
    name: project-creator-sa
    namespace: project-creator
roleRef:
  kind: Role
  name: project-creator-role
  apiGroup: rbac.authorization.k8s.io
---
# oauth-proxy'nin OpenShift API'sine TokenReview/SAR sorgusu yapabilmesi için
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: project-creator-oauth-proxy
rules:
  - apiGroups: ["authentication.k8s.io"]
    resources: ["tokenreviews"]
    verbs: ["create"]
  - apiGroups: ["authorization.k8s.io"]
    resources: ["subjectaccessreviews"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: project-creator-oauth-proxy
subjects:
  - kind: ServiceAccount
    name: project-creator-sa
    namespace: project-creator
roleRef:
  kind: ClusterRole
  name: project-creator-oauth-proxy
  apiGroup: rbac.authorization.k8s.io
---
# cookie-secret: `openssl rand -base64 32` ile üretip buraya yazın
apiVersion: v1
kind: Secret
metadata:
  name: oauth2-proxy-cookie-secret
  namespace: project-creator
type: Opaque
stringData:
  cookie-secret: "<openssl rand -base64 32 ile üretilen değer>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-creator
  namespace: project-creator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-creator
  template:
    metadata:
      labels:
        app: project-creator
    spec:
      serviceAccountName: project-creator-sa
      containers:
        - name: app
          # image: <registry-host>/<namespace>/project-creator:latest  ← kendi registry adresinizi yazın
          image: <registry-host>/<namespace>/project-creator:latest
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080

        - name: oauth-proxy
          image: quay.io/openshift/origin-oauth-proxy:4.12
          args:
            - --openshift-service-account=project-creator-sa
            - --upstream=http://localhost:8080
            - --provider=openshift
            - --allowed-groups=project-creators        # erişime izin verilen grup adı
            - --https-port=8443
            - --tls-cert=/etc/tls/private/tls.crt
            - --tls-key=/etc/tls/private/tls.key
            - --cookie-secret=$(COOKIE_SECRET)
            - --openshift-ca=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          env:
            - name: COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: oauth2-proxy-cookie-secret
                  key: cookie-secret
          ports:
            - containerPort: 8443
              name: https
          volumeMounts:
            - name: tls-cert
              mountPath: /etc/tls/private
      volumes:
        - name: tls-cert
          secret:
            secretName: project-creator-tls  # Service annotation ile otomatik üretilir (aşağıya bakın)
---
apiVersion: v1
kind: Service
metadata:
  name: project-creator
  namespace: project-creator
  annotations:
    # Bu annotation ile OpenShift TLS secret'ı otomatik üretir
    service.beta.openshift.io/serving-cert-secret-name: project-creator-tls
spec:
  ports:
    - port: 443
      targetPort: 8443
      name: https
  selector:
    app: project-creator
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: project-creator
  namespace: project-creator
spec:
  to:
    kind: Service
    name: project-creator
  tls:
    termination: reencrypt
  port:
    targetPort: https
